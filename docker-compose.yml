services:
  qwen3_asr:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: qwen3_asr_openai
    restart: unless-stopped
    ports:
      - "12301:12301"
    environment:
      # 模型升级/切换：改这里重启即可（0.6B更省，1.7B更强）
      MODEL_ID: "Qwen/Qwen3-ASR-1.7B"
      # 可选：锁定到某个 revision/commit（用于可复现）
      # MODEL_REVISION: "main"

      # 推理参数
      DEVICE_MAP: "cuda:0"       # 多卡可写 "cuda:0" 或 "auto"
      DTYPE: "bfloat16"          # cpu 用 float32
      MAX_NEW_TOKENS: "512"
      MAX_BATCH: "1"             # 1.7B 模型/长音频更稳；显存充足可调大提升吞吐
      MAX_CONCURRENT_TRANSCRIBE: "1" # 单个后端 worker 内的并发上限；多卡时每张卡 1 个 worker

      # 长音频切片与拼接
      CHUNK_SECONDS: "600"        # 每段时长（秒）
      CHUNK_OVERLAP_SECONDS: "1"  # 段间重叠（秒）
      CONTEXT_TAIL_CHARS: "200"   # 每段转写时追加上一段尾部上下文（字符数；0 关闭）

      # 文本后处理（中文数值归一化）
      # 二零二六年 -> 2026年；百分之五点五 -> 5.5%
      NORMALIZE_ZH_NUMBERS: "1"

      # MCP base64 输入上限（解码后字节数）
      MCP_MAX_INPUT_BYTES: "33554432"

      # HF 缓存目录（自动下载模型）
      HF_HOME: "/models"

      # 代理（可选）：用于容器内拉取 HuggingFace 模型/依赖
      # 仅需设置 HTTP_PROXY；服务启动时会自动复用到 HTTPS_PROXY
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}

      # 服务端口（默认 12301）
      PORT: "12301"
      # 多卡默认行为：
      # - 当容器可见多张 GPU 且 AUTO_BACKEND_REPLICAS=1 时，
      #   外层服务会按“每张卡 1 个 ASR worker”启动，并轮询分发请求
      # - 如果只想保留单进程/单卡行为，可设置 AUTO_BACKEND_REPLICAS=0
      # - worker 监听 127.0.0.1:${BACKEND_PORT}+N，不对外暴露
      BACKEND_HOST: "127.0.0.1"
      BACKEND_PORT: "8001"
      AUTO_BACKEND_REPLICAS: "1"

      # 热重载保护（可选）
      ADMIN_TOKEN: "change-me"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # 选卡：宿主机第 1 张卡写 "0"，第 2 张卡写 "1"
              # 如果这里写 ["0","1"]，默认会在两张卡上各起 1 个 ASR worker 并支持并发转写
              device_ids: ["0"]
              capabilities: [gpu]
