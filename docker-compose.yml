services:
  qwen3_asr:
    build: .
    container_name: qwen3_asr_openai
    restart: unless-stopped
    ports:
      - "12301:12301"
    environment:
      # 模型升级/切换：改这里重启即可（0.6B更省，1.7B更强）
      MODEL_ID: "Qwen/Qwen3-ASR-1.7B"
      # 可选：锁定到某个 revision/commit（用于可复现）
      # MODEL_REVISION: "main"

      # 推理参数
      DEVICE_MAP: "cuda:0"       # 多卡可写 "cuda:0" 或 "auto"
      DTYPE: "bfloat16"          # cpu 用 float32
      MAX_NEW_TOKENS: "512"
      MAX_BATCH: "1"             # 1.7B 模型/长音频更稳；显存充足可调大提升吞吐

      # HF 缓存目录（自动下载模型）
      HF_HOME: "/models"

      # 代理（可选）：用于容器内拉取 HuggingFace 模型/依赖
      # 仅需设置 HTTP_PROXY；服务启动时会自动复用到 HTTPS_PROXY
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}

      # 热重载保护（可选）
      ADMIN_TOKEN: "change-me"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
      PORT: "12301"
